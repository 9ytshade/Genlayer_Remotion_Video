<?xml version="1.0" encoding="UTF-8"?>
<svg width="280" height="280" viewBox="0 0 280 280" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Body -->
  <circle cx="140" cy="150" r="100" fill="#FFFFFF" stroke="#8B5CF6" stroke-width="8"/>
  
  <!-- Ears -->
  <path d="M70 90 L70 50 L110 75 Z" fill="#FFFFFF" stroke="#8B5CF6" stroke-width="8" stroke-linejoin="round"/>
  <path d="M210 90 L210 50 L170 75 Z" fill="#FFFFFF" stroke="#8B5CF6" stroke-width="8" stroke-linejoin="round"/>
  
  <!-- Screen Face -->
  <rect x="90" y="110" width="100" height="70" rx="20" fill="#0A0A0A" stroke="#8B5CF6" stroke-width="4"/>
  
  <!-- Eyes -->
  <circle cx="115" cy="145" r="8" fill="#8B5CF6">
    <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="165" cy="145" r="8" fill="#8B5CF6">
    <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Headphones -->
  <path d="M60 150 C60 100 220 100 220 150" stroke="#3B82F6" stroke-width="12" stroke-linecap="round"/>
  <rect x="50" y="130" width="20" height="40" rx="10" fill="#3B82F6"/>
  <rect x="210" y="130" width="20" height="40" rx="10" fill="#3B82F6"/>
</svg>
